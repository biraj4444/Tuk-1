services:
  - type: web
    name: tuk-9
    env: python
    region: singapore   # closest to South/Southeast Asia
    plan: free
    rootDir: customer_portal
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
